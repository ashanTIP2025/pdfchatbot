models:
  - type: main
    engine: openai
    model: gpt-4o

rails:
  input:
    flows:
      - detect sensitive data on input
  output:
    flows:
      - detect sensitive data on output

sensitive_data_detection:
  presidio:
    input:
      entities:
        - PERSON
        - EMAIL_ADDRESS
        - PHONE_NUMBER
        - US_SSN
        - CREDIT_CARD
        - US_BANK_NUMBER
        - IP_ADDRESS
      on_detection: block
    output:
      entities:
        - PERSON
        - EMAIL_ADDRESS
        - PHONE_NUMBER
        - US_SSN
        - CREDIT_CARD
      on_detection: mask
